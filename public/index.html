<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>Tap-Tap! 🎯</title>

<meta name="description" content="Tap fast. Compete globally. Earn onchain rewards." />
<meta name="theme-color" content="#0b1220" />

<link rel="icon" href="/icon.png" />
<link rel="manifest" href="/manifest.json" />

<!-- Analytics -->
<script defer data-domain="tap-tap-miniapp.vercel.app"
src="https://plausible.io/js/script.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- Ethers -->
<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

<!-- MiniApp SDK -->
<script defer src="https://cdn.jsdelivr.net/npm/@farcaster/miniapp-sdk/dist/index.min.js"></script>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:white;
}
.wrap{
max-width:420px;
margin:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
}
.card{
background:#101826;
padding:16px;
border-radius:20px;
}
button{
border:none;
padding:14px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}
.primary{background:#2563eb;color:white}
.success{background:#22c55e;color:black}

.tap-btn{
width:200px;
height:200px;
border-radius:50%;
font-size:26px;
background:#22c55e;
transition:transform .1s ease;
}
.tap-btn:active{
transform:scale(.9);
}
.score-pop{
animation:pop .3s ease;
}
@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}
ol{padding-left:20px}
</style>
</head>
<body>

<div class="wrap">

<div class="card">
<h2>🎯 Tap-Tap</h2>
<p>Tap fast in 10 seconds.</p>
</div>

<div class="card">
<div style="display:flex;justify-content:space-between">
<div>Score: <b id="score">0</b></div>
<div>Time: <b id="time">10</b>s</div>
</div>

<center>
<button id="tap" class="tap-btn" disabled>START</button>
</center>

<br>

<button id="start" class="primary" style="width:100%">Start Game</button>
<button id="share" class="primary" style="width:100%;display:none">Share Score</button>
<button id="reward" class="success" style="width:100%;display:none">
Claim Onchain Reward
</button>

</div>

<!-- Local Leaderboard -->
<div class="card">
<h3>🏆 Local Leaderboard</h3>
<ol id="localBoard"></ol>
</div>

<!-- Global Leaderboard -->
<div class="card">
<h3>🌍 Global Leaderboard</h3>
<ol id="globalBoard"></ol>
</div>

</div>

<!-- Sounds -->
<audio id="tapSound" src="/tap.mp3"></audio>
<audio id="endSound" src="/end.mp3"></audio>

<script>

/* =======================
   CONFIG
======================= */

const supabase = window.supabase.createClient(
"YOUR_SUPABASE_URL",
"YOUR_SUPABASE_ANON_KEY"
);

/* =======================
   ELEMENTS
======================= */

const tapBtn=document.getElementById("tap");
const startBtn=document.getElementById("start");
const shareBtn=document.getElementById("share");
const rewardBtn=document.getElementById("reward");
const scoreEl=document.getElementById("score");
const timeEl=document.getElementById("time");
const localBoard=document.getElementById("localBoard");
const globalBoard=document.getElementById("globalBoard");

let score=0;
let time=10;
let playing=false;
let timer;

/* =======================
   SOUNDS
======================= */

function tapSound(){
document.getElementById("tapSound").play();
}
function endSound(){
document.getElementById("endSound").play();
}

/* =======================
   LOCAL LEADERBOARD
======================= */

function saveLocal(s){
let scores=JSON.parse(localStorage.getItem("scores")||"[]");
scores.push(s);
scores.sort((a,b)=>b-a);
scores=scores.slice(0,5);
localStorage.setItem("scores",JSON.stringify(scores));
renderLocal();
}

function renderLocal(){
let scores=JSON.parse(localStorage.getItem("scores")||"[]");
localBoard.innerHTML=scores.map(s=>`<li>${s}</li>`).join("");
}

/* =======================
   GLOBAL LEADERBOARD
======================= */

async function saveGlobal(s){
await supabase.from("scores").insert([
{username:"anon",score:s}
]);
loadGlobal();
}

async function loadGlobal(){
const {data}=await supabase
.from("scores")
.select("*")
.order("score",{ascending:false})
.limit(10);

globalBoard.innerHTML=data?.map(d=>
`<li>${d.username} — ${d.score}</li>`
).join("")||"";
}

/* =======================
   ONCHAIN REWARD
======================= */

async function claimReward(){
if(!window.ethereum){
alert("Install wallet");
return;
}

const provider=new ethers.providers.Web3Provider(window.ethereum);
await provider.send("eth_requestAccounts",[]);
const signer=provider.getSigner();

const contract=new ethers.Contract(
"YOUR_CONTRACT_ADDRESS",
["function reward(address player,uint256 score) public"],
signer
);

await contract.reward(await signer.getAddress(),score);
alert("Reward Claimed 🚀");
}

/* =======================
   GAME
======================= */

startBtn.onclick=()=>{
score=0;
time=10;
playing=true;

scoreEl.textContent=score;
timeEl.textContent=time;

tapBtn.disabled=false;
tapBtn.textContent="TAP";
shareBtn.style.display="none";
rewardBtn.style.display="none";

timer=setInterval(()=>{
time--;
timeEl.textContent=time;
if(time<=0)endGame();
},1000);
};

tapBtn.onclick=()=>{
if(!playing)return;

score++;
scoreEl.textContent=score;

tapSound();
scoreEl.classList.add("score-pop");
setTimeout(()=>scoreEl.classList.remove("score-pop"),300);
};

function endGame(){
playing=false;
clearInterval(timer);
tapBtn.disabled=true;
tapBtn.textContent="DONE";

endSound();

shareBtn.style.display="block";
rewardBtn.style.display="block";

saveLocal(score);
saveGlobal(score);
}

/* =======================
   SHARE
======================= */

shareBtn.onclick=async()=>{
const text=`I scored ${score} in Tap-Tap! 🎯 Play: https://tap-tap-miniapp.vercel.app`;

if(window.miniapp?.sdk?.actions?.composeCast){
await window.miniapp.sdk.actions.composeCast({text});
}else{
await navigator.clipboard.writeText(text);
alert("Copied!");
}
};

rewardBtn.onclick=claimReward;

/* =======================
   INIT
======================= */

renderLocal();
loadGlobal();

/* Register Service Worker */
if("serviceWorker"in navigator){
navigator.serviceWorker.register("/sw.js");
}

</script>

</body>
</html>
